<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Secure Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Brand Logo -->
            <div class="brand">
                <span class="brand-icon">🛡️</span>
                <span class="brand-name">Oasis Portal</span>
            </div>

            <!-- Tab Switcher -->
            <div class="tab-bar">
                <button class="tab-btn active" id="tab-login" data-tab="login">Login</button>
                <button class="tab-btn" id="tab-signup" data-tab="signup">Sign Up</button>
                <div class="tab-indicator"></div>
            </div>

            <!-- ==================== LOGIN PANEL ==================== -->
            <div class="tab-panel" id="panel-login">
                <p class="panel-subtitle">Welcome back! Enter your credentials to continue.</p>

                <div id="login-message" class="alert-message hidden"></div>

                <form id="login-form" novalidate>
                    <!-- Email or Phone -->
                    <div class="input-group">
                        <label for="login-identifier">Email or Phone Number</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="login-identifier" placeholder="you@email.com or 9876543210" required autocomplete="username">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
                            <button type="button" class="toggle-pass" data-target="login-password" title="Toggle visibility">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth" id="login-submit-btn">Login Securely</button>
                </form>

                <p class="switch-hint">New here? <span class="switch-link" data-target-tab="signup">Create an account</span></p>
            </div>

            <!-- ==================== SIGN UP PANEL ==================== -->
            <div class="tab-panel hidden" id="panel-signup">
                <p class="panel-subtitle">Join now — it's completely free.</p>

                <div id="signup-message" class="alert-message hidden"></div>

                <form id="signup-form" novalidate>
                    <!-- Full Name -->
                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="signup-name" placeholder="John Doe" required autocomplete="name">
                        </div>
                    </div>

                    <!-- Phone Number -->
                    <div class="input-group">
                        <label for="signup-phone">Phone Number</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <input type="tel" id="signup-phone" placeholder="9876543210" required autocomplete="tel">
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input type="email" id="signup-email" placeholder="you@email.com" required autocomplete="email">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="signup-password" placeholder="Min. 8 chars + 1 number" required autocomplete="new-password">
                            <button type="button" class="toggle-pass" data-target="signup-password" title="Toggle visibility">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                            <input type="password" id="signup-confirm" placeholder="Repeat your password" required autocomplete="new-password">
                            <button type="button" class="toggle-pass" data-target="signup-confirm" title="Toggle visibility">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Password Strength Indicators -->
                    <div class="requirements-box">
                        <ul>
                            <li id="req-length" class="req-item invalid"><span class="bullet">✖</span> At least 8 characters</li>
                            <li id="req-number" class="req-item invalid"><span class="bullet">✖</span> At least 1 number</li>
                            <li id="req-match"  class="req-item invalid"><span class="bullet">✖</span> Passwords match</li>
                        </ul>
                    </div>

                    <button type="submit" class="btn-auth" id="signup-submit-btn">Create Account</button>
                </form>

                <p class="switch-hint">Already registered? <span class="switch-link" data-target-tab="login">Login here</span></p>
            </div>

        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
